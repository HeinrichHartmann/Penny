<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Penny mark</title>
  <desc id="desc">A warm coin-like emblem with a stylized letter P and ledger lines.</desc>
  <defs>
    <linearGradient id="coinFill" x1="48" y1="36" x2="208" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f9edd7"/>
      <stop offset="0.55" stop-color="#f2ddbb"/>
      <stop offset="1" stop-color="#debe90"/>
    </linearGradient>
    <linearGradient id="rimFill" x1="30" y1="22" x2="226" y2="234" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9d7242"/>
      <stop offset="0.5" stop-color="#7f572d"/>
      <stop offset="1" stop-color="#5f3f1d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#4c381c" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="105" fill="url(#rimFill)"/>
    <circle cx="128" cy="128" r="88" fill="url(#coinFill)"/>
    <circle cx="128" cy="128" r="81" fill="none" stroke="#fdf8ef" stroke-opacity="0.45" stroke-width="2"/>
  </g>

  <g fill="none" stroke="#5d3e1f" stroke-linecap="round" stroke-linejoin="round">
    <path d="M96 71v114" stroke-width="17"/>
    <path d="M96 74h36c27 0 46 17 46 41s-19 40-46 40H96" stroke-width="17"/>
  </g>
</svg>
