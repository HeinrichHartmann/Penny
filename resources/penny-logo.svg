<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-labelledby="title desc">
  <title id="title">Penny logo</title>
  <desc id="desc">Penny wordmark with a warm coin-like emblem and serif lettering.</desc>
  <defs>
    <linearGradient id="coinFill" x1="54" y1="32" x2="214" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f9edd7"/>
      <stop offset="0.55" stop-color="#f2ddbb"/>
      <stop offset="1" stop-color="#debe90"/>
    </linearGradient>
    <linearGradient id="rimFill" x1="36" y1="18" x2="230" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9d7242"/>
      <stop offset="0.5" stop-color="#7f572d"/>
      <stop offset="1" stop-color="#5f3f1d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#4c381c" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="820" height="260" rx="32" fill="#f7f1e6"/>

  <g transform="translate(18 2)" filter="url(#shadow)">
    <circle cx="112" cy="128" r="94" fill="url(#rimFill)"/>
    <circle cx="112" cy="128" r="79" fill="url(#coinFill)"/>
    <circle cx="112" cy="128" r="72" fill="none" stroke="#fdf8ef" stroke-opacity="0.45" stroke-width="2"/>
    <g fill="none" stroke="#5d3e1f" stroke-linecap="round" stroke-linejoin="round">
      <path d="M86 84v88" stroke-width="14"/>
      <path d="M86 86h31c24 0 40 13 40 31s-16 31-40 31H86" stroke-width="14"/>
    </g>
  </g>

  <g transform="translate(248 0)">
    <text
      x="0"
      y="124"
      fill="#1d1b17"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="98"
      font-weight="700"
      letter-spacing="1.5"
    >Penny</text>
    <text
      x="4"
      y="168"
      fill="#6f675a"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="28"
      letter-spacing="3.5"
    >LOCAL FINANCE, HUMAN SCALE</text>
    <path d="M4 191H436" stroke="#d8ccb7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="456" cy="191" r="6" fill="#845b31"/>
    <path d="M485 191h112" stroke="#d8ccb7" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
