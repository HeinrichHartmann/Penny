<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penny</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app" class="page">
    <sidebar-nav :view="view" @navigate="view = $event"></sidebar-nav>

    <!-- Main Content Area -->
    <main class="main-content">

    <!-- Import View -->
    <import-view
      v-if="view === 'import'"
      :key="`import-${appDataVersion}`"
      :model="importModel"
      :actions="importViewActions"
    ></import-view>

    <!-- Accounts View -->
    <accounts-view
      v-if="view === 'accounts'"
      :key="`accounts-${appDataVersion}`"
      :model="accountsModel"
      :actions="accountsViewActions"
      :filters="filters"
      :toggle-account="toggleAccount"
    ></accounts-view>

    <!-- Transactions View -->
    <transactions-view
      v-if="view === 'transactions'"
      :key="`transactions-${appDataVersion}`"
      :model="transactionsViewModel"
    ></transactions-view>

    <!-- Rules View -->
    <rules-view
      v-if="view === 'rules'"
      :key="`rules-${appDataVersion}`"
      :model="rulesModel"
      :actions="rulesViewActions"
    ></rules-view>

    <!-- Report View -->
    <report-view
      v-if="view === 'report'"
      :key="`report-${appDataVersion}`"
      :model="reportViewModel"
    ></report-view>

    <!-- Balance View -->
    <balance-view
      v-if="view === 'balance'"
      :key="`balance-${appDataVersion}`"
      :model="balanceViewModel"
    ></balance-view>

    <!-- Settings View -->
    <settings-view
      v-if="view === 'settings'"
      :filters="filters"
    ></settings-view>

    </main><!-- end main-content -->

  </div><!-- end app -->

  <script type="module" src="/app.js"></script>
</body>
</html>
