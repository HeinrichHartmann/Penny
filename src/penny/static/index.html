<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penny</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app" class="page">

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <h1 class="sidebar-title">Penny</h1>
        <button @click="view = 'import'" :class="['nav-item', view === 'import' ? 'active' : '']">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16">
              <path d="M8 2v8"></path>
              <path d="M5 7.5 8 10.5 11 7.5"></path>
              <path d="M3 12.5h10"></path>
            </svg>
          </span>
          <span class="nav-label">Import</span>
        </button>
        <button @click="view = 'accounts'" :class="['nav-item', view === 'accounts' ? 'active' : '']">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16">
              <rect x="2.5" y="4" width="11" height="8" rx="1.5"></rect>
              <path d="M10.5 8h3"></path>
              <path d="M4.5 6.5h3"></path>
            </svg>
          </span>
          <span class="nav-label">Accounts</span>
        </button>
        <button @click="view = 'rules'" :class="['nav-item', view === 'rules' ? 'active' : '']">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16">
              <path d="M3 4.5h10"></path>
              <path d="M3 8h10"></path>
              <path d="M3 11.5h10"></path>
              <circle cx="6" cy="4.5" r="1"></circle>
              <circle cx="10" cy="8" r="1"></circle>
              <circle cx="7" cy="11.5" r="1"></circle>
            </svg>
          </span>
          <span class="nav-label">Rules</span>
        </button>
        <button @click="view = 'transactions'" :class="['nav-item', view === 'transactions' ? 'active' : '']">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16">
              <path d="M4 4.5h9"></path>
              <path d="M4 8h9"></path>
              <path d="M4 11.5h9"></path>
              <path d="M2.5 4.5h.01"></path>
              <path d="M2.5 8h.01"></path>
              <path d="M2.5 11.5h.01"></path>
            </svg>
          </span>
          <span class="nav-label">Transactions</span>
        </button>
        <button @click="view = 'report'" :class="['nav-item', view === 'report' ? 'active' : '']">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16">
              <path d="M3 12.5h10"></path>
              <path d="M5 12.5v-3"></path>
              <path d="M8 12.5v-6"></path>
              <path d="M11 12.5v-4.5"></path>
            </svg>
          </span>
          <span class="nav-label">Report</span>
        </button>
      </nav>
      <nav class="sidebar-footer">
        <button @click="view = 'settings'" :class="['nav-item', view === 'settings' ? 'active' : '']">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16">
              <circle cx="8" cy="8" r="2.2"></circle>
              <path d="M8 2.5v1.3"></path>
              <path d="M8 12.2v1.3"></path>
              <path d="M13.5 8h-1.3"></path>
              <path d="M3.8 8H2.5"></path>
              <path d="m11.9 4.1-.9.9"></path>
              <path d="m5 11-.9.9"></path>
              <path d="m11.9 11.9-.9-.9"></path>
              <path d="m5 5-.9-.9"></path>
            </svg>
          </span>
          <span class="nav-label">Settings</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">

    <!-- Import View -->
    <import-view v-if="view === 'import'" @imported="handleImportComplete"></import-view>

    <!-- Accounts View -->
    <accounts-view
      v-if="view === 'accounts'"
      :filters="filters"
      :toggle-account="toggleAccount"
      :refresh-meta="refreshMeta"
    ></accounts-view>

    <!-- Transactions View -->
    <transactions-view
      v-if="view === 'transactions'"
      :model="transactionsViewModel"
    ></transactions-view>

    <!-- Rules View -->
    <rules-view v-if="view === 'rules'"></rules-view>

    <!-- Report View -->
    <report-view
      v-if="view === 'report'"
      :model="reportViewModel"
    ></report-view>

    <!-- Settings View -->
    <div v-if="view === 'settings'">
      <h2 style="font-size: 1.4rem; margin-bottom: 20px;">Settings</h2>

      <div class="panel" style="padding: 24px;">
        <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--ink);">Data Processing</h3>

        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 12px 0;">
          <input type="checkbox" v-model="filters.neutralize" style="width: 18px; height: 18px; cursor: pointer;">
          <div>
            <div style="font-size: 0.9rem; font-weight: 500;">Neutralize transfers</div>
            <div style="font-size: 0.8rem; color: var(--muted); margin-top: 2px;">
              Automatically hide internal transfers between your accounts to avoid double-counting
            </div>
          </div>
        </label>
      </div>
    </div>

    </main><!-- end main-content -->

  </div><!-- end app -->

  <script type="module" src="/app.js"></script>
</body>
</html>
